<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="{{styleUri}}" />
  </head>

  <body>
    <h2>CONVERT VSCODE EXTENSION</h2>

    <div id="toast" class="toast"></div>

    <div class="section">
      <label for="apiKey">API Key</label>
      <input placeholder="API_KEY:API_SECRET" id="apiKey" />
    </div>

    <div class="section">
      <label for="accountId">Account ID</label>
      <input id="accountId" />
    </div>

    <button onclick="loadProjects()">Load Projects</button>

    <div class="section">
      <label>Project</label>
      <div id="projects"></div>
    </div>

    <div class="section">
      <label>Experiment</label>
      <div id="experiences"></div>
    </div>

    <div class="section">
      <label>Variation</label>
      <div id="variations"></div>
    </div>

    <hr />

    <h3>Files</h3>

    <div id="filesList" class="files-list">
      <div class="no-files">Drag files into "Drop Files Here" panel below</div>
    </div>

    <div class="section">
      <button id="submitBtn" onclick="submit()">
        <span id="btnText">Push to Convert</span>
        <span id="btnLoader" class="loader" style="display: none"></span>
      </button>
    </div>

    <footer>
      <p>
        By <a href="https://github.com/shreyashsingh-101" target="_blank">SS</a>
      </p>
    </footer>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h3>Confirm Push</h3>

        <p id="confirmText"></p>

        <div class="modal-actions">
          <button onclick="confirmSubmit()">Confirm</button>
          <button onclick="closeModal()" class="secondary">Cancel</button>
        </div>
      </div>
    </div>

    <script src="{{scriptUri}}"></script>
  </body>
</html>
