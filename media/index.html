<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="{{styleUri}}" />
  </head>

  <body>
    <div class="title-row">
      <h2>CONVERT VSCODE EXTENSION</h2>
      <button
        id="clientIdBtn"
        class="title-action"
        onclick="openClientIdModal()"
      >
        Change Client ID
      </button>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Auth Section -->
    <div id="apiKeySection" class="section">
      <label for="apiKey">API Key</label>
      <input placeholder="API_KEY:API_SECRET" id="apiKey" />
    </div>

    <div id="orSeparator" class="or-separator"><span>OR</span></div>

    <div id="oauthSection" class="section" style="display:none">
      <p style="margin:0">Connected via Convert OAuth</p>
    </div>

    <div class="section">
      <button id="authBtn" onclick="handleAuthBtn()">Login with Convert</button>
    </div>

    <div id="accountIdSection" class="section">
      <label for="accountId">Account ID</label>
      <input id="accountId" />
    </div>

    <div id="accountSelectSection" class="section" style="display:none">
      <label>Account</label>
      <div id="accounts"></div>
    </div>

    <button onclick="loadProjects()">Load Projects</button>

    <div class="section">
      <label>Project</label>
      <div id="projects"></div>
    </div>

    <div class="section">
      <label>Experiment</label>
      <div id="experiences"></div>
    </div>

    <div class="section">
      <label>Variation</label>
      <div id="variations"></div>
    </div>

    <div class="section compact-section">
      <button id="clearAllBtn" class="secondary-button" onclick="clearAll()">
        Clear All
      </button>
    </div>

    <hr />

    <h3>Files</h3>

    <div id="filesList" class="files-list">
      <div class="no-files">Drag files into "Drop Files Here" panel below</div>
    </div>

    <div class="section">
      <button id="submitBtn" onclick="submit()">
        <span id="btnText">Push to Convert</span>
        <span id="btnLoader" class="loader" style="display: none"></span>
      </button>
    </div>

    <footer>
      <p>
        By <a href="https://github.com/shreyashsingh-101" target="_blank">SS</a>. <a href="https://github.com/shreyashsingh-101/convert-vscode-extension" target="_blank">v0.0.4</a>
      </p>
    </footer>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h3>Confirm Push</h3>

        <p id="confirmText"></p>

        <div class="modal-actions">
          <button onclick="confirmSubmit()">Confirm</button>
          <button onclick="closeModal()" class="secondary">Cancel</button>
        </div>
      </div>
    </div>

    <div id="clientIdModal" class="modal hidden">
      <div class="modal-content">
        <h3>Change Client ID</h3>

        <div class="section">
          <label for="clientIdInput">Client ID</label>
          <input id="clientIdInput" placeholder="Convert OAuth client ID" />
        </div>

        <div class="modal-actions">
          <button onclick="saveClientId()">Save</button>
          <button onclick="closeClientIdModal()" class="secondary">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script src="{{scriptUri}}"></script>
  </body>
</html>
