<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="{{styleUri}}" />
  </head>

  <body>
    <h2>Convert</h2>

    <div id="toast" class="toast"></div>

    <div class="section">
      <label>API Key</label>
      <input id="apiKey" />
    </div>

    <div class="section">
      <label>Account ID</label>
      <input id="accountId" />
    </div>

    <button onclick="loadProjects()">Load Projects</button>

    <div class="section">
      <label>Project</label>
      <div id="projects"></div>
    </div>

    <div class="section">
      <label>Experiment</label>
      <div id="experiences"></div>
    </div>

    <div class="section">
      <label>Variation</label>
      <div id="variations"></div>
    </div>

    <hr />

    <h3>Files</h3>

    <div id="filesList" class="files-list">
      <div class="no-files">
        Drag files into "Drop Files Here" panel below
      </div>
    </div>

    <button onclick="submit()">Push to Convert</button>

    <script src="{{scriptUri}}"></script>
  </body>
</html>
